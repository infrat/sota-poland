name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pozwól na jeden równoległy deploy, anuluj starsze w kolejce
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wstrzyknij hash commita do stopki
        run: |
          SHORT="$(git rev-parse --short HEAD)"
          FULL="$(git rev-parse HEAD)"
          sed -i "s/__BUILD_COMMIT_SHORT__/${SHORT}/g; s/__BUILD_COMMIT__/${FULL}/g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
